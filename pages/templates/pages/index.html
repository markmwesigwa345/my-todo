{% load static %}
<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Day — Todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'pages/css/todo.css' %}">

</head>
<body>

<div class="glow"></div>

<!-- ── Header ── -->
<header>
<div class="nav-bar">
  <span>👤 {{ request.user.username }}</span>
  <a href="{% url 'logout' %}">Log out</a>
</div>
  <div class="header-top">
    <div>
      <div class="date-chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span id="date-label">Today</span>
      </div>
      <h1>My day</h1>
      <p class="subtitle">Plan your time, tick it done.</p>
    </div>

    <!-- Progress ring -->
    <div class="progress-wrap">
      <svg class="ring-svg" viewBox="0 0 52 52" aria-hidden="true">
        <circle class="ring-track" cx="26" cy="26" r="21"/>
        <circle class="ring-fill" id="ring-fill" cx="26" cy="26" r="21"
          stroke-dasharray="131.9" stroke-dashoffset="131.9"/>
      </svg>
      <div class="ring-pct" id="ring-pct">0%</div>
      <div class="ring-label">done today</div>
    </div>
  </div>

  <!-- Stats pills -->
  <div class="stats-bar">
    <div class="stat-pill" id="pill-total">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      0 tasks
    </div>
    <div class="stat-pill green" id="pill-done">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      0 done
    </div>
    <div class="stat-pill amber" id="pill-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      0 left
    </div>
  </div>
</header>

<div class="divider"></div>

<!-- ── Main ── -->
<main>

  <!-- Add form -->
  <div class="add-card">
  <div class="add-card-label">Add a task</div>
  <div class="add-row">
    <input type="text" id="task-input" placeholder="What do you need to do?" autocomplete="off" />
    <input type="time" id="time-input" />
    <button class="btn-add" type="button" onclick="addTodo()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add task
    </button>
  </div>
</div>

  <!-- Filters -->
  <div class="filter-row" role="group" aria-label="Filter tasks">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('morning', this)">Morning</button>
    <button class="filter-btn" onclick="setFilter('afternoon', this)">Afternoon</button>
    <button class="filter-btn" onclick="setFilter('evening', this)">Evening</button>
  </div>

  <!-- Task list -->
  <!-- Task list -->
  <div>
    <div class="section-label" style="margin-bottom:12px">Tasks</div>
    <div class="list-area" id="list-area"></div>
  </div>
</main>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- ──────────────── JavaScript ──────────────── -->
 <script>
  const dbTodos = [
    {% for todo in todos %}
    { id: {{ todo.pk }}, text: "{{ todo.title }}", done: {{ todo.is_done|yesno:"true,false" }} }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ];
</script>
<script src="{% static 'pages/js/todo.js' %}"></script>
</body>
</html>
