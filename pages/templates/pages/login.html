{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Login — My Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'pages/css/todo.css' %}">
</head>
<body>
<div class="glow"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div>
      <h1>Welcome back</h1>
      <p>Log in to your account.</p>
    </div>
    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}
    <form class="auth-form" method="post">
      {% csrf_token %}
      <input name="username" type="text" placeholder="Username" autocomplete="username" required />
      <input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
      <button class="btn-add" type="submit">Log in</button>
    </form>
    <div class="auth-link">
      No account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</div>
</body>
</html>
